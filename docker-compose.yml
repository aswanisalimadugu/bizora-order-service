# BizLink local Docker
#
# Default: API connects to Neon via DATABASE_URL in .env (same data as production).
# Optional local Postgres only:  docker compose --profile local-db up -d

services:
  # Optional — only with: docker compose --profile local-db up -d
  db:
    profiles: ["local-db"]
    image: postgres:16-alpine
    container_name: bizlink-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: bizlink
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - bizlink_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bizlink"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bizlink-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      # Keep container paths / local frontend defaults
      SERVER_PORT: "8080"
      UPLOAD_DIR: /app/uploads
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:5173}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000,https://bizlink-web-cyan.vercel.app}
      # When DATABASE_URL is set in .env, NeonDatabaseConfig is used (ignore DB_URL).
    volumes:
      - bizlink_uploads:/app/uploads

volumes:
  bizlink_pgdata:
  bizlink_uploads:
