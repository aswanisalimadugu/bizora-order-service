apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bizlink-api
  namespace: bizlink
  labels:
    app: bizlink-api
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: api.bizlink.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bizlink-api
                port:
                  number: 80
