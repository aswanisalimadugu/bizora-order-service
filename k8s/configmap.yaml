apiVersion: v1
kind: ConfigMap
metadata:
  name: bizlink-config
  namespace: bizlink
  labels:
    app: bizlink-api
data:
  SERVER_PORT: "8080"
  DB_URL: "jdbc:postgresql://postgres:5432/bizlink"
  DB_USERNAME: "postgres"
  JWT_EXPIRATION_MS: "86400000"
  UPLOAD_DIR: "/app/uploads"
  SPRING_PROFILES_ACTIVE: "prod"
