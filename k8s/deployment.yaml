apiVersion: apps/v1
kind: Deployment
metadata:
  name: bizlink-api
  namespace: bizlink
  labels:
    app: bizlink-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bizlink-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: bizlink-api
    spec:
      containers:
        - name: bizlink-api
          image: bizlink-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: bizlink-config
            - secretRef:
                name: bizlink-secret
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
          readinessProbe:
            httpGet:
              path: /swagger-ui/index.html
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /swagger-ui/index.html
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
      volumes:
        - name: uploads
          emptyDir: {}
