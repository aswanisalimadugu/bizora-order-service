databaseChangeLog:
  - changeSet:
      id: 012-add-admin-fields
      author: bizlink
      changes:
        - addColumn:
            tableName: business
            columns:
              - column:
                  name: verified
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(30)
                  defaultValue: ACTIVE
                  constraints:
                    nullable: false
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: last_login
                  type: TIMESTAMP
        - sql:
            sql: UPDATE business SET status = 'ACTIVE' WHERE status IS NULL OR status = ''
  - changeSet:
      id: 012-seed-admin-user
      author: bizlink
      preConditions:
        - onFail: MARK_RAN
        - sqlCheck:
            expectedResult: 0
            sql: SELECT COUNT(*) FROM users WHERE email = 'anji@gmail.com'
      changes:
        - insert:
            tableName: users
            columns:
              - column:
                  name: id
                  value: "bbbbbbbb-bbbb-bbbb-bbbb-bbbbbbbbbbbb"
              - column:
                  name: name
                  value: "Anji Admin"
              - column:
                  name: email
                  value: "anji@gmail.com"
              - column:
                  name: mobile
                  value: "9876543210"
              - column:
                  name: password
                  value: "$2a$10$j9itfFR9IWCWnRyM5N6BXeQyYglOI4pWCAluQqQcgNzHAXHZS2Ci."
              - column:
                  name: role
                  value: "ADMIN"
              - column:
                  name: status
                  value: "ACTIVE"
              - column:
                  name: created_at
                  valueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  valueComputed: CURRENT_TIMESTAMP
