spring:
  application:
    name: bizlink
  datasource:
    # Render / Cloud Run: use DATABASE_URL or DB_URL
    url: ${DB_URL:${DATABASE_URL:jdbc:postgresql://ep-dawn-queen-aoobagtz-pooler.c-2.ap-southeast-1.aws.neon.tech/bizlink?sslmode=require}}
    username: ${DB_USERNAME:bizlink_owner}
    password: ${DB_PASSWORD:npg_2zSrUa5wITfM}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

server:
  port: ${PORT:${SERVER_PORT:8080}}

jwt:
  secret: ${JWT_SECRET:}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

app:
  upload-dir: ${UPLOAD_DIR:uploads}
  frontend-dir: ${FRONTEND_DIR:}
  public-base-url: ${PUBLIC_BASE_URL:http://localhost:5173}
  # Production MUST set DEV_MODE=false. Mock payments / empty signatures only when true.
  dev-mode: ${DEV_MODE:true}
  # AES key for encrypting tenant Razorpay secrets (32+ chars). Falls back to JWT_SECRET hash.
  encryption-key: ${APP_ENCRYPTION_KEY:}
  # If merchant keys missing, allow platform Razorpay for customer orders (legacy / trial).
  allow-platform-order-payments: ${ALLOW_PLATFORM_ORDER_PAYMENTS:true}
  # Daily purge of free-plan order data older than 7 days (cron).
  free-plan-retention-cron: ${FREE_PLAN_RETENTION_CRON:0 15 3 * * *}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,https://bizlink-a5sj4229d-anjireddysalimadugus-projects.vercel.app}
  storage:
    type: ${STORAGE_TYPE:local}
    s3:
      bucket: ${S3_BUCKET:}
      region: ${S3_REGION:ap-south-1}
      public-base-url: ${S3_PUBLIC_BASE_URL:}
  subscription-expiry-cron: ${SUBSCRIPTION_EXPIRY_CRON:0 0 * * * *}

razorpay:
  key-id: ${RAZORPAY_KEY_ID:}
  key-secret: ${RAZORPAY_KEY_SECRET:}
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:}

ai:
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4o-mini}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}

logging:
  level:
    com.bizlink: INFO
    org.springframework.security: WARN
